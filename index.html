<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Emily's Flower Shop</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        height: 100%;
        height: -webkit-fill-available;
      }
      body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        height: -webkit-fill-available;
        background: #fdf6f0;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #game-container {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
      #game-container canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
